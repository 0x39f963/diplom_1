<svg xmlns="http://www.w3.org/2000/svg" width="720" height="250" viewBox="0 0 720 250" font-family="Inter,Segoe UI,sans-serif"><rect width="720" height="250" fill="#ffffff"/><text x="20" y="26" fill="#1a1f2b" font-size="17" font-weight="700">Очное сравнение Qwen 9B и Llama 70B</text><text x="20" y="50" fill="#5b6472" font-size="13">Из 122 запросов модели разошлись на 35. На остальных 87 ответили одинаково.</text><rect x="20" y="78" width="680" height="48" rx="8" fill="#e9edf2"/><rect x="20" y="78" width="485" height="48" rx="8" fill="#7c5cff" opacity="0.85"/><rect x="505" y="78" width="195" height="48" rx="8" fill="#5b6472" opacity="0.7"/><text x="36" y="108" fill="#fff" font-size="17" font-weight="700">Qwen верно: 25</text><text x="684" y="108" fill="#fff" font-size="17" font-weight="700" text-anchor="end">Llama верно: 10</text><text x="20" y="158" fill="#5b6472" font-size="13">столько раз модель оказалась права там, где другая ошиблась</text><text x="20" y="192" fill="#e0a33a" font-size="15" font-weight="600">Среди побед Qwen - 5 продвинутых инъекций, которые Llama пропустила</text></svg>