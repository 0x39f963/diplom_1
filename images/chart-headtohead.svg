<svg xmlns="http://www.w3.org/2000/svg" width="720" height="230" viewBox="0 0 720 230" font-family="Inter,Segoe UI,sans-serif"><rect width="720" height="230" fill="#ffffff"/><text x="20" y="26" fill="#1a1f2b" font-size="17" font-weight="700">Где кто выиграл: Qwen 9B против Llama 70B</text><rect x="20" y="70" width="680" height="46" rx="8" fill="#e9edf2"/><rect x="20" y="70" width="485" height="46" rx="8" fill="#7c5cff" opacity="0.85"/><rect x="505" y="70" width="195" height="46" rx="8" fill="#5b6472" opacity="0.7"/><text x="34" y="99" fill="#fff" font-size="18" font-weight="700">Qwen 9B: 25</text><text x="686" y="99" fill="#fff" font-size="18" font-weight="700" text-anchor="end">Llama 70B: 10</text><text x="20" y="160" fill="#e0a33a" font-size="15" font-weight="600">Среди побед Qwen - 5 продвинутых инъекций, которые Llama пропустила</text><text x="20" y="186" fill="#5b6472" font-size="14">кейсы, где одна модель справилась, а другая нет (всего 35)</text></svg>