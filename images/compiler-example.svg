<svg xmlns="http://www.w3.org/2000/svg" width="860" height="561" viewBox="0 0 860 561" font-family="Segoe UI, Roboto, sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#5b6472"/>
    </marker>
    <style>
      .h{font-size:13px;fill:#0f1117;font-weight:700}
      .l{font-size:11.5px;fill:#34405a}
      .m{font-size:11.5px;font-family:'DejaVu Sans Mono',Consolas,monospace;fill:#2d3a52}
      .edge{stroke:#5b6472;stroke-width:1.6;fill:none;marker-end:url(#arr)}
    </style>
  </defs>
  <rect x="0" y="0" width="860" height="561" fill="#ffffff"/>
  <text x="28" y="34" font-size="19" font-weight="700" fill="#0f1117">Пример: компилятор собирает план</text>
  <text x="28" y="56" font-size="12.5" fill="#5b6472">запрос «по договору CT-2 хватает ли документов и что требует 38-ФЗ»</text>
  <rect x="28" y="78" width="372" height="182" rx="8" fill="#f7f8fa" stroke="#dde2ea" stroke-width="1.3"/>
  <rect x="28" y="78" width="6" height="182" rx="3" fill="#c7ccd6"/>
  <text x="44" y="99" font-size="11" font-weight="700" fill="#5b6472">ВХОД: фрейм от парсера</text>
  <text class="m" x="44" y="122">{</text>
  <text class="m" x="44" y="139">  "operation": "diagnose",</text>
  <text class="m" x="44" y="156">  "target": "Document",</text>
  <text class="m" x="44" y="173">  "relation": "documents",</text>
  <text class="m" x="44" y="190">  "fields": ["missing", "legal_signal"],</text>
  <text class="m" x="44" y="207">  "selector": {"contract_id": "CT-2"},</text>
  <text class="m" x="44" y="224">  "confidence": 0.63</text>
  <text class="m" x="44" y="241">}</text>
  <rect x="452" y="78" width="380" height="148" rx="8" fill="#f7f8fa" stroke="#dde2ea" stroke-width="1.3"/>
  <rect x="452" y="78" width="6" height="148" rx="3" fill="#3a7bd5"/>
  <text x="468" y="99" font-size="11" font-weight="700" fill="#5b6472">ранжирование карт протоколов</text>
  <text class="m" x="468" y="122">missing_documents  199<tspan fill="#9aa3b2">  // выбрана</tspan></text>
  <text class="m" x="468" y="139">document_list      174</text>
  <text class="m" x="468" y="156">read_document      166</text>
  <text class="m" x="468" y="173"></text>
  <text class="m" x="468" y="190">score = priority + операция+50</text>
  <text class="m" x="468" y="207">  + цель+60 + связь+28 + бонус+40</text>
  <path class="edge" d="M404,169.0 L448,169.0"/>
  <path class="edge" d="M430,264 L430,286"/>
  <rect x="28" y="290" width="372" height="165" rx="8" fill="#f7f8fa" stroke="#dde2ea" stroke-width="1.3"/>
  <rect x="28" y="290" width="6" height="165" rx="3" fill="#7c5cff"/>
  <text x="44" y="311" font-size="11" font-weight="700" fill="#5b6472">ПЛАН: todo-шаги (TodoPlan)</text>
  <text class="m" x="44" y="334">[</text>
  <text class="m" x="44" y="351">  "parse_goal",</text>
  <text class="m" x="44" y="368">  "list_documents",</text>
  <text class="m" x="44" y="385">  "check_missing_documents",</text>
  <text class="m" x="44" y="402">  "retrieve_legal",</text>
  <text class="m" x="44" y="419">  "summarize_answer"</text>
  <text class="m" x="44" y="436">]</text>
  <rect x="452" y="290" width="380" height="165" rx="8" fill="#f7f8fa" stroke="#dde2ea" stroke-width="1.3"/>
  <rect x="452" y="290" width="6" height="165" rx="3" fill="#e0a33a"/>
  <text x="468" y="311" font-size="11" font-weight="700" fill="#5b6472">ПОКРЫТИЕ атомов (coverage)</text>
  <text class="m" x="468" y="334">{</text>
  <text class="m" x="468" y="351">  "requested": [Contract.documents,</text>
  <text class="m" x="468" y="368">     Contract.documents.missing,</text>
  <text class="m" x="468" y="385">     Legal.rules],</text>
  <text class="m" x="468" y="402">  "covered": [те же три атома],</text>
  <text class="m" x="468" y="419">  "missing": []<tspan fill="#9aa3b2">  // пропусков нет</tspan></text>
  <text class="m" x="468" y="436">}</text>
  <path class="edge" d="M404,372.5 L448,372.5"/>
  <rect x="28" y="479" width="804" height="58" rx="8" fill="#f3f4f7" stroke="#d8dde6" stroke-width="1.3"/>
  <text x="48" y="501" font-size="12" font-weight="700" fill="#34405a">Инструменты (read-only): eva_list_contract_documents, retrieve_legal.</text>
  <text x="48" y="519" font-size="12" font-weight="400" fill="#34405a">Выход: не хватает акта DOC-3, норма 38-ФЗ подтянута в тот же ответ. Модель данные не выдумывает.</text>
</svg>
