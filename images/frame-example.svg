<svg xmlns="http://www.w3.org/2000/svg" width="860" height="478" viewBox="0 0 860 478" font-family="Segoe UI, Roboto, sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#5b6472"/>
    </marker>
    <style>
      .h{font-size:13px;fill:#0f1117;font-weight:700}
      .l{font-size:11.5px;fill:#34405a}
      .m{font-size:11.5px;font-family:'DejaVu Sans Mono',Consolas,monospace;fill:#2d3a52}
      .edge{stroke:#5b6472;stroke-width:1.6;fill:none;marker-end:url(#arr)}
    </style>
  </defs>
  <rect x="0" y="0" width="860" height="478" fill="#ffffff"/>
  <text x="28" y="34" font-size="19" font-weight="700" fill="#0f1117">Пример: запрос превращается в анкету</text>
  <text x="28" y="56" font-size="12.5" fill="#5b6472">детерминированный препроцессор и модель заполняют типизированный фрейм</text>
  <rect x="28" y="78" width="804" height="54" rx="8" fill="#eef0f4" stroke="#c7ccd6" stroke-width="1.5"/>
  <text class="h" x="44" y="102">Запрос</text>
  <text class="l" x="44" y="124">«покажи стороны по договору CT-1»</text>
  <path class="edge" d="M430,134 L430,162"/>
  <rect x="28" y="172" width="372" height="148" rx="8" fill="#f7f8fa" stroke="#dde2ea" stroke-width="1.3"/>
  <rect x="28" y="172" width="6" height="148" rx="3" fill="#c7ccd6"/>
  <text x="44" y="193" font-size="11" font-weight="700" fill="#5b6472">NLU-признаки (детерминированно)</text>
  <text class="m" x="44" y="216">{</text>
  <text class="m" x="44" y="233">  "lemmas": ["сторона", "договор"],</text>
  <text class="m" x="44" y="250">  "entity_ids": {"contracts": ["CT-1"]},</text>
  <text class="m" x="44" y="267">  "entities": ["ContractParty"],</text>
  <text class="m" x="44" y="284">  "action_verbs": ["показать"]</text>
  <text class="m" x="44" y="301">}</text>
  <rect x="452" y="172" width="380" height="182" rx="8" fill="#f7f8fa" stroke="#dde2ea" stroke-width="1.3"/>
  <rect x="452" y="172" width="6" height="182" rx="3" fill="#3a7bd5"/>
  <text x="468" y="193" font-size="11" font-weight="700" fill="#5b6472">анкета PlanningFrame (модель)</text>
  <text class="m" x="468" y="216">{</text>
  <text class="m" x="468" y="233">  "operation": "list",</text>
  <text class="m" x="468" y="250">  "target": "ContractParty",</text>
  <text class="m" x="468" y="267">  "relation": "parties",</text>
  <text class="m" x="468" y="284">  "selector": {"contract_id": "CT-1"},</text>
  <text class="m" x="468" y="301">  "cardinality": "all",</text>
  <text class="m" x="468" y="318">  "confidence": 0.86</text>
  <text class="m" x="468" y="335">}</text>
  <path class="edge" d="M404,263.0 L448,263.0"/>
  <rect x="28" y="378" width="804" height="76" rx="8" fill="#f3f4f7" stroke="#d8dde6" stroke-width="1.3"/>
  <text x="48" y="400" font-size="12" font-weight="700" fill="#34405a">Поля анкеты:</text>
  <text x="48" y="418" font-size="12" font-weight="400" fill="#34405a">operation - что делаем (list), target - что показываем (ContractParty), relation - по какой связи (parties).</text>
  <text x="48" y="436" font-size="12" font-weight="400" fill="#34405a">selector - по какому ключу (contract_id), cardinality - сколько (all), confidence - уверенность из факторов.</text>
</svg>
