<svg xmlns="http://www.w3.org/2000/svg" width="860" height="473" viewBox="0 0 860 473" font-family="Segoe UI, Roboto, sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#5b6472"/>
    </marker>
    <style>
      .h{font-size:13px;fill:#0f1117;font-weight:700}
      .l{font-size:11.5px;fill:#34405a}
      .m{font-size:11.5px;font-family:'DejaVu Sans Mono',Consolas,monospace;fill:#2d3a52}
      .edge{stroke:#5b6472;stroke-width:1.6;fill:none;marker-end:url(#arr)}
    </style>
  </defs>
  <rect x="0" y="0" width="860" height="473" fill="#ffffff"/>
  <text x="28" y="34" font-size="19" font-weight="700" fill="#0f1117">Механизм: закон добавляется к данным</text>
  <text x="28" y="56" font-size="12.5" fill="#5b6472">запрос «нужна ли маркировка для размещений CT-1, покажи размещения»</text>
  <rect x="701" y="22" width="131" height="24" rx="12" fill="#fff1de" stroke="#e0a33a" stroke-width="1.3"/>
  <text x="767" y="34" font-size="11.5" font-weight="700" fill="#34405a" text-anchor="middle" dominant-baseline="middle">класс E  ~5 кейсов</text>
  <rect x="28" y="78" width="372" height="92" rx="8" fill="#fdeaea" stroke="#d9534f" stroke-width="1.5"/>
  <text class="h" x="44" y="102">Было</text>
  <text class="l" x="44" y="124">сигнал закона уводит в отдельную ветку нормы</text>
  <text class="l" x="44" y="142">запрос про размещения теряется</text>
  <text class="l" x="44" y="160">ответ только про закон, без данных</text>
  <rect x="452" y="78" width="380" height="92" rx="8" fill="#e6f3ee" stroke="#2bb673" stroke-width="1.5"/>
  <text class="h" x="468" y="102">Стало</text>
  <text class="l" x="468" y="124">has_legal_signal -&gt; retrieve_legal в тот же план</text>
  <text class="l" x="468" y="142">размещения и норма в одном ответе</text>
  <text class="l" x="468" y="160">data-шаг остается фокусным</text>
  <path class="edge" d="M404,124.0 L448,124.0"/>
  <rect x="28" y="200" width="372" height="165" rx="8" fill="#f7f8fa" stroke="#dde2ea" stroke-width="1.3"/>
  <rect x="28" y="200" width="6" height="165" rx="3" fill="#c7ccd6"/>
  <text x="44" y="221" font-size="11" font-weight="700" fill="#5b6472">вход: фрейм</text>
  <text class="m" x="44" y="244">{</text>
  <text class="m" x="44" y="261">  "operation": "list",</text>
  <text class="m" x="44" y="278">  "target": "Placement",</text>
  <text class="m" x="44" y="295">  "relation": "placements",</text>
  <text class="m" x="44" y="312">  "fields": ["legal_signal"],</text>
  <text class="m" x="44" y="329">  "selector": {"contract_id": "CT-1"}</text>
  <text class="m" x="44" y="346">}</text>
  <rect x="452" y="200" width="380" height="165" rx="8" fill="#f7f8fa" stroke="#dde2ea" stroke-width="1.3"/>
  <rect x="452" y="200" width="6" height="165" rx="3" fill="#3a7bd5"/>
  <text x="468" y="221" font-size="11" font-weight="700" fill="#5b6472">выход: общий план</text>
  <text class="m" x="468" y="244">[</text>
  <text class="m" x="468" y="261">  list_placements(CT-1),</text>
  <text class="m" x="468" y="278">     emits Contract.placements,</text>
  <text class="m" x="468" y="295">  legal_check_against_data(query),</text>
  <text class="m" x="468" y="312">     emits Legal.rules,</text>
  <text class="m" x="468" y="329">  summarize_answer</text>
  <text class="m" x="468" y="346">]</text>
  <path class="edge" d="M404,282.5 L448,282.5"/>
  <rect x="28" y="391" width="804" height="58" rx="8" fill="#f3f4f7" stroke="#d8dde6" stroke-width="1.3"/>
  <text x="48" y="417" font-size="12" font-weight="700" fill="#34405a">Легальный сигнал (38-фз, маркировка, обязан, нужно ли) добавляет шаг нормы, не заменяя data-план.</text>
  <text x="48" y="435" font-size="12" font-weight="400" fill="#34405a">Код: nlu/preprocess.py (has_legal_signal), planner/compile.py, nodes/frame_parser.py.</text>
</svg>
