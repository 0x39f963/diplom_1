<svg xmlns="http://www.w3.org/2000/svg" width="860" height="456" viewBox="0 0 860 456" font-family="Segoe UI, Roboto, sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#5b6472"/>
    </marker>
    <style>
      .h{font-size:13px;fill:#0f1117;font-weight:700}
      .l{font-size:11.5px;fill:#34405a}
      .m{font-size:11.5px;font-family:'DejaVu Sans Mono',Consolas,monospace;fill:#2d3a52}
      .edge{stroke:#5b6472;stroke-width:1.6;fill:none;marker-end:url(#arr)}
    </style>
  </defs>
  <rect x="0" y="0" width="860" height="456" fill="#ffffff"/>
  <text x="28" y="34" font-size="19" font-weight="700" fill="#0f1117">Механизм: проверка покрытия атомов</text>
  <text x="28" y="56" font-size="12.5" fill="#5b6472">запрос «по договору CT-2 покажи карточку, стороны и недостающие документы»</text>
  <rect x="681" y="22" width="151" height="24" rx="12" fill="#fff1de" stroke="#e0a33a" stroke-width="1.3"/>
  <text x="757" y="34" font-size="11.5" font-weight="700" fill="#34405a" text-anchor="middle" dominant-baseline="middle">класс E  фундамент R7</text>
  <rect x="28" y="78" width="372" height="92" rx="8" fill="#fdeaea" stroke="#d9534f" stroke-width="1.5"/>
  <text class="h" x="44" y="102">Было</text>
  <text class="l" x="44" y="124">модель берет одну top-1 карту</text>
  <text class="l" x="44" y="142">карта закрывает один атом из трех</text>
  <text class="l" x="44" y="160">стороны или документы пропадают</text>
  <rect x="452" y="78" width="380" height="92" rx="8" fill="#e6f3ee" stroke="#2bb673" stroke-width="1.5"/>
  <text class="h" x="468" y="102">Стало</text>
  <text class="l" x="468" y="124">из запроса собираем обязательные атомы</text>
  <text class="l" x="468" y="142">сверяем с тем, что выдают инструменты</text>
  <text class="l" x="468" y="160">не хватает атома -&gt; достраиваем шаг</text>
  <path class="edge" d="M404,124.0 L448,124.0"/>
  <rect x="28" y="200" width="372" height="148" rx="8" fill="#f7f8fa" stroke="#dde2ea" stroke-width="1.3"/>
  <rect x="28" y="200" width="6" height="148" rx="3" fill="#e0a33a"/>
  <text x="44" y="221" font-size="11" font-weight="700" fill="#5b6472">обязательные атомы запроса</text>
  <text class="m" x="44" y="244">requested_atoms = {</text>
  <text class="m" x="44" y="261">  Contract.card,</text>
  <text class="m" x="44" y="278">  Contract.parties,</text>
  <text class="m" x="44" y="295">  Contract.documents,</text>
  <text class="m" x="44" y="312">  Contract.documents.missing</text>
  <text class="m" x="44" y="329">}</text>
  <rect x="452" y="200" width="380" height="131" rx="8" fill="#f7f8fa" stroke="#dde2ea" stroke-width="1.3"/>
  <rect x="452" y="200" width="6" height="131" rx="3" fill="#2bb673"/>
  <text x="468" y="221" font-size="11" font-weight="700" fill="#5b6472">слепок покрытия плана</text>
  <text class="m" x="468" y="244">coverage = {</text>
  <text class="m" x="468" y="261">  "covered": [card, parties,</text>
  <text class="m" x="468" y="278">      documents, documents.missing],</text>
  <text class="m" x="468" y="295">  "missing": []<tspan fill="#9aa3b2">  // пропусков нет</tspan></text>
  <text class="m" x="468" y="312">}</text>
  <path class="edge" d="M404,274.0 L448,274.0"/>
  <rect x="28" y="374" width="804" height="58" rx="8" fill="#f3f4f7" stroke="#d8dde6" stroke-width="1.3"/>
  <text x="48" y="400" font-size="12" font-weight="700" fill="#34405a">У каждого инструмента есть emits: get_contract-&gt;Contract.card, list_documents-&gt;Contract.documents.</text>
  <text x="48" y="418" font-size="12" font-weight="400" fill="#34405a">Код: planner/coverage.py (requested_atoms, plan_coverage), planner/catalog.py (emits у todo).</text>
</svg>
