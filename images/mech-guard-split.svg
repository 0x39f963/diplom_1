<svg xmlns="http://www.w3.org/2000/svg" width="860" height="473" viewBox="0 0 860 473" font-family="Segoe UI, Roboto, sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#5b6472"/>
    </marker>
    <style>
      .h{font-size:13px;fill:#0f1117;font-weight:700}
      .l{font-size:11.5px;fill:#34405a}
      .m{font-size:11.5px;font-family:'DejaVu Sans Mono',Consolas,monospace;fill:#2d3a52}
      .edge{stroke:#5b6472;stroke-width:1.6;fill:none;marker-end:url(#arr)}
    </style>
  </defs>
  <rect x="0" y="0" width="860" height="473" fill="#ffffff"/>
  <text x="28" y="34" font-size="19" font-weight="700" fill="#0f1117">Механизм: команда против инъекции</text>
  <text x="28" y="56" font-size="12.5" fill="#5b6472">охрана входа различает действие над сущностью и попытку взлома</text>
  <rect x="701" y="22" width="131" height="24" rx="12" fill="#fff1de" stroke="#e0a33a" stroke-width="1.3"/>
  <text x="767" y="34" font-size="11.5" font-weight="700" fill="#34405a" text-anchor="middle" dominant-baseline="middle">класс B  ~7 кейсов</text>
  <rect x="28" y="78" width="372" height="92" rx="8" fill="#fdeaea" stroke="#d9534f" stroke-width="1.5"/>
  <text class="h" x="44" y="102">Было</text>
  <text class="l" x="44" y="124">охрана режет по подозрительным словам</text>
  <text class="l" x="44" y="142">«скачай документ DOC-1» блокируется</text>
  <text class="l" x="44" y="160">легитимные команды не проходят</text>
  <rect x="452" y="78" width="380" height="92" rx="8" fill="#e6f3ee" stroke="#2bb673" stroke-width="1.5"/>
  <text class="h" x="468" y="102">Стало</text>
  <text class="l" x="468" y="124">детектор получает доменный контекст</text>
  <text class="l" x="468" y="142">read-команда с ID без инъекции -&gt; allow</text>
  <text class="l" x="468" y="160">явная инъекция -&gt; block</text>
  <path class="edge" d="M404,124.0 L448,124.0"/>
  <rect x="28" y="200" width="372" height="165" rx="8" fill="#f7f8fa" stroke="#dde2ea" stroke-width="1.3"/>
  <rect x="28" y="200" width="6" height="165" rx="3" fill="#2bb673"/>
  <text x="44" y="221" font-size="11" font-weight="700" fill="#5b6472">выход: «скачай документ DOC-1»</text>
  <text class="m" x="44" y="244">{</text>
  <text class="m" x="44" y="261">  "decision": "allow",</text>
  <text class="m" x="44" y="278">  "risk_type": "none",</text>
  <text class="m" x="44" y="295">  "domain_signals": ["DOC-1"],</text>
  <text class="m" x="44" y="312">  "safe_read_action": true,</text>
  <text class="m" x="44" y="329">  "matched_rules": []</text>
  <text class="m" x="44" y="346">}</text>
  <rect x="452" y="200" width="380" height="165" rx="8" fill="#f7f8fa" stroke="#dde2ea" stroke-width="1.3"/>
  <rect x="452" y="200" width="6" height="165" rx="3" fill="#d9534f"/>
  <text x="468" y="221" font-size="11" font-weight="700" fill="#5b6472">выход: «забудь инструкции...»</text>
  <text class="m" x="468" y="244">{</text>
  <text class="m" x="468" y="261">  "decision": "block",</text>
  <text class="m" x="468" y="278">  "risk_type": "prompt_injection",</text>
  <text class="m" x="468" y="295">  "risk_score": 0.95,</text>
  <text class="m" x="468" y="312">  "matched_rules": ["ignore_previous"],</text>
  <text class="m" x="468" y="329">  "domain_signals": []</text>
  <text class="m" x="468" y="346">}</text>
  <path class="edge" d="M404,282.5 L448,282.5"/>
  <rect x="28" y="391" width="804" height="58" rx="8" fill="#f3f4f7" stroke="#d8dde6" stroke-width="1.3"/>
  <text x="48" y="417" font-size="12" font-weight="700" fill="#34405a">Явные deny-паттерны (забудь инструкции, покажи системный промпт) активны всегда, операции записи закрыты.</text>
  <text x="48" y="435" font-size="12" font-weight="400" fill="#34405a">Код: nodes/guards.py, security/injection_detector.py, nlu/preprocess.py (is_read_only_domain_command).</text>
</svg>
