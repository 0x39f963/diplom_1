<svg xmlns="http://www.w3.org/2000/svg" width="860" height="473" viewBox="0 0 860 473" font-family="Segoe UI, Roboto, sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#5b6472"/>
    </marker>
    <style>
      .h{font-size:13px;fill:#0f1117;font-weight:700}
      .l{font-size:11.5px;fill:#34405a}
      .m{font-size:11.5px;font-family:'DejaVu Sans Mono',Consolas,monospace;fill:#2d3a52}
      .edge{stroke:#5b6472;stroke-width:1.6;fill:none;marker-end:url(#arr)}
    </style>
  </defs>
  <rect x="0" y="0" width="860" height="473" fill="#ffffff"/>
  <text x="28" y="34" font-size="19" font-weight="700" fill="#0f1117">Механизм: поиск как шаг разрешения</text>
  <text x="28" y="56" font-size="12.5" fill="#5b6472">запрос «найди договор Д-2025/249 и покажи карточку»</text>
  <rect x="701" y="22" width="131" height="24" rx="12" fill="#fff1de" stroke="#e0a33a" stroke-width="1.3"/>
  <text x="767" y="34" font-size="11.5" font-weight="700" fill="#34405a" text-anchor="middle" dominant-baseline="middle">класс D  ~6 кейсов</text>
  <rect x="28" y="78" width="372" height="92" rx="8" fill="#fdeaea" stroke="#d9534f" stroke-width="1.5"/>
  <text class="h" x="44" y="102">Было</text>
  <text class="l" x="44" y="124">поиск отдает голый список и на этом стоп</text>
  <text class="l" x="44" y="142">номер договора так и не превращен в id</text>
  <text class="l" x="44" y="160">карточку человек не получает</text>
  <rect x="452" y="78" width="380" height="92" rx="8" fill="#e6f3ee" stroke="#2bb673" stroke-width="1.5"/>
  <text class="h" x="468" y="102">Стало</text>
  <text class="l" x="468" y="124">search_contracts -&gt; resolver, выдает id</text>
  <text class="l" x="468" y="142">результат кормит следующий шаг</text>
  <text class="l" x="468" y="160">карточка собирается вторым шагом</text>
  <path class="edge" d="M404,124.0 L448,124.0"/>
  <rect x="28" y="200" width="372" height="131" rx="8" fill="#f7f8fa" stroke="#dde2ea" stroke-width="1.3"/>
  <rect x="28" y="200" width="6" height="131" rx="3" fill="#c7ccd6"/>
  <text x="44" y="221" font-size="11" font-weight="700" fill="#5b6472">вход: фрейм</text>
  <text class="m" x="44" y="244">{</text>
  <text class="m" x="44" y="261">  "operation": "read",</text>
  <text class="m" x="44" y="278">  "target": "Contract",</text>
  <text class="m" x="44" y="295">  "selector": {"query": "Д-2025/249"}</text>
  <text class="m" x="44" y="312">}</text>
  <rect x="452" y="200" width="380" height="165" rx="8" fill="#f7f8fa" stroke="#dde2ea" stroke-width="1.3"/>
  <rect x="452" y="200" width="6" height="165" rx="3" fill="#3a7bd5"/>
  <text x="468" y="221" font-size="11" font-weight="700" fill="#5b6472">выход: план со связыванием</text>
  <text class="m" x="468" y="244">[</text>
  <text class="m" x="468" y="261">  search_contracts(query),</text>
  <text class="m" x="468" y="278">     emits Contract.resolution -&gt; id,</text>
  <text class="m" x="468" y="295">  get_contract(contract_id=$from search),</text>
  <text class="m" x="468" y="312">     emits Contract.card,</text>
  <text class="m" x="468" y="329">  summarize_answer</text>
  <text class="m" x="468" y="346">]</text>
  <path class="edge" d="M404,282.5 L448,282.5"/>
  <rect x="28" y="391" width="804" height="58" rx="8" fill="#f3f4f7" stroke="#d8dde6" stroke-width="1.3"/>
  <text x="48" y="417" font-size="12" font-weight="700" fill="#34405a">Связывание (bind_plan) подставляет contract_id из результата поиска во вход карточки.</text>
  <text x="48" y="435" font-size="12" font-weight="400" fill="#34405a">Код: planner/compile.py, planner/protocols.py (contract_search_*), planner/bind.py.</text>
</svg>
